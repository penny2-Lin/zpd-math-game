<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZPD 榮譽拍貼機 - 完美比例版</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            text-align: center;
            padding: 10px;
        }
        /* 升級：固定攝影棚的比例為 4:3，並隱藏多餘邊緣 */
        .camera-box {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 4 / 3;
            margin: 0 auto 15px auto;
            border: 4px solid #2c3e50;
            border-radius: 12px;
            overflow: hidden;
            background-color: #000;
        }
        /* 升級：使用 object-fit: cover 讓預覽畫面不變形 */
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transform: scaleX(-1);
        }
        /* 升級：確保相框也等比例填滿 */
        #frame-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            z-index: 10;
        }
        .controls {
            margin-bottom: 20px;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .btn.active {
            background-color: #e67e22;
            transform: scale(1.05);
        }
        .btn-snap {
            background-color: #e74c3c;
            font-size: 20px;
            padding: 15px 30px;
            border-radius: 30px;
        }
        #download-btn {
            background-color: #27ae60;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
        }
        #result-box {
            display: none;
            margin-top: 20px;
        }
        #photo {
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            border: 4px solid #f39c12;
        }
    </style>
</head>
<body>

    <h2>🐰 新英 ZPD 拍貼機 🦊</h2>
    
    <div class="controls">
        <p>請選擇你的專屬探員邊框：</p>
        <button class="btn frame-btn active" data-src="frame_judy.png">🐰 茱蒂款</button>
        <button class="btn frame-btn" data-src="frame_nick.png">🦊 尼克款</button>
        <button class="btn frame-btn" data-src="frame_flash.png">🦥 樹懶款</button>
    </div>

    <div class="camera-box">
        <video id="video" autoplay playsinline></video>
        <img id="frame-overlay" src="frame_judy.png" alt="" onerror="this.style.display='none'">
    </div>

    <div>
        <button id="snap-btn" class="btn btn-snap">📸 拍下結業合照</button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <div id="result-box">
        <h3>🎉 恭喜通關！這是你的專屬照片 🎉</h3>
        <img id="photo" alt="你的拍貼照">
        <br>
        <a id="download-btn" class="btn">⬇️ 下載儲存至 iPad</a>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snapBtn = document.getElementById('snap-btn');
        const resultBox = document.getElementById('result-box');
        const photo = document.getElementById('photo');
        const downloadBtn = document.getElementById('download-btn');
        const frameOverlay = document.getElementById('frame-overlay');
        const frameBtns = document.querySelectorAll('.frame-btn');

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("相機啟動失敗: ", err);
                alert("無法啟動相機！請確認您已允許相機權限。");
            }
        }
        startCamera();

        frameBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                frameBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const newSrc = this.getAttribute('data-src');
                frameOverlay.src = newSrc;
                frameOverlay.style.display = 'block';
            });
        });

        snapBtn.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            
            // 升級 1：以相框的實際尺寸建立高畫質畫布 (預設 1440x1080)
            canvas.width = (frameOverlay.naturalWidth > 0) ? frameOverlay.naturalWidth : 1440;
            canvas.height = (frameOverlay.naturalHeight > 0) ? frameOverlay.naturalHeight : 1080;

            const frameW = canvas.width;
            const frameH = canvas.height;
            const videoW = video.videoWidth;
            const videoH = video.videoHeight;

            // 升級 2：計算智慧裁切比例，確保不變形
            const scale = Math.max(frameW / videoW, frameH / videoH);
            const drawW = videoW * scale;
            const drawH = videoH * scale;
            const startX = (frameW - drawW) / 2;
            const startY = (frameH - drawH) / 2;

            // 步驟 A：翻轉並畫上攝影機畫面
            context.translate(canvas.width, 0);
            context.scale(-1, 1);
            context.drawImage(video, startX, startY, drawW, drawH);

            // 步驟 B：翻轉回來
            context.translate(canvas.width, 0);
            context.scale(-1, 1);

            // 步驟 C：疊上相框
            if (frameOverlay.complete && frameOverlay.naturalHeight !== 0) {
                context.drawImage(frameOverlay, 0, 0, canvas.width, canvas.height);
            }

            // 步驟 D：畫上浮水印與文字
            context.fillStyle = "rgba(0, 0, 0, 0.5)";
            context.fillRect(0, canvas.height - 100, canvas.width, 100);
            // 根據畫布大小微調字體大小
            const fontSize = Math.floor(canvas.width * 0.045); 
            context.font = `bold ${fontSize}px 'Helvetica Neue', sans-serif`;
            context.fillStyle = "#f1c40f"; 
            context.textAlign = "center";
            context.fillText("新英 ZPD 榮譽探員結業留念", canvas.width / 2, canvas.height - 35);

            // 步驟 E：輸出
            const dataURL = canvas.toDataURL('image/png');
            photo.src = dataURL;
            resultBox.style.display = "block";
            downloadBtn.href = dataURL;
            downloadBtn.download = "ZPD_Mission_Completed.png";
            
            resultBox.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
